app:
  auth:
    jwt-secret: "changeme-32-char-secret-key-here!!"
  photo:
    storage:
      upload-dir: /tmp/meradeya-uploads/listings/
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:meradeya}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  mvc:
    log-resolved-exception: true
    
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
