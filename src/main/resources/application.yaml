spring:
  application:
    name: app
  threads:
    virtual:
      enabled: true
  jpa:
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  mvc:
    apiversion:
      use:
        path-segment: 0
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB

app:
  cache:
    enabled: ${APP_CACHE_ENABLED:true}
    key-prefix: ${APP_CACHE_KEY_PREFIX:app::}
    listings:
      enabled: ${APP_CACHE_LISTINGS_ENABLED:true}
      ttl: ${APP_CACHE_LISTINGS_TTL:1h}
    categories:
      ttl: ${APP_CACHE_CATEGORIES_TTL:24h}

  auth:
    jwt-secret: ${JWT_SECRET}
    access-token-expiry-seconds: ${ACCESS_TOKEN_EXPIRY:900}
    refresh-token-expiry-seconds: ${REFRESH_TOKEN_EXPIRY:2592000}
    email-verify-token-expiry-seconds: ${EMAIL_VERIFY_EXPIRY:86400}
    password-reset-token-expiry-seconds: ${PASSWORD_RESET_EXPIRY:3600}
  photo:
    storage:
      upload-dir: ${UPLOAD_DIR}
      max-file-size-bytes: ${MAX_PHOTO_SIZE:10485760}
      max-photos-per-listing: ${MAX_PHOTOS:10}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false